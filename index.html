<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Pomodoro Premium com Metas 📊</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="app-wrapper">
        <div class="container">
            <h1 id="status-titulo">Hora de Focar 🍅</h1>
            <div class="timer" id="timer">25:00</div>
            
            <div class="controls">
                <button id="start-btn">Iniciar</button>
                <button id="pause-btn">Pausar</button>
                <button id="reset-btn">Resetar</button>
            </div>

            <div class="goal-container">
                <div class="goal-header">
                    <span>Meta Diária:</span>
                    <span id="goal-text">0 / 120 min</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="goal-bar"></div>
                </div>
            </div>

            <div class="stats">
                <h3>Sessão Atual:</h3>
                <p>Ciclos hoje: <span id="cycles-count">0</span></p>
                <p>Foco hoje: <span id="hours-count">0</span> min</p>
            </div>
        </div>

        <div class="report-container">
            <div class="report-header">
                <h2>Relatório de Desempenho</h2>
                <div class="view-selector">
                    <button id="btn-semanal" class="active">Semanal</button>
                    <button id="btn-mensal">Mensal</button>
                </div>
            </div>
            
            <div class="summary-cards">
                <div class="card">
                    <h4>Total Focado</h4>
                    <p id="resumo-total">0h 0m</p>
                </div>
                <div class="card">
                    <h4>Média Período</h4>
                    <p id="resumo-media">0 min</p>
                </div>
                <div class="card">
                    <h4>Total Intervalo</h4>
                    <p id="resumo-pausa">0 min</p>
                </div>
            </div>

            <div class="chart-box">
                <canvas id="meuGrafico"></canvas>
            </div>

            <div class="table-box">
                <h3>Histórico Detalhado</h3>
                <div class="table-scroll">
                    <table id="tabela-historico">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Ciclos</th>
                                <th>Tempo Foco</th>
                                <th>Tempo Intervalo</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <audio id="som-alarme" src="alarme.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
